version: '3.8'

x-common-env: &common-env
  ENVIRONMENT: docker
  DATABASE_URL: postgresql+asyncpg://postgres:root@postgres:5432/major
  KAFKA_BROKER_URL: kafka
  KAFKA_BROKER_PORT: 9092
  INTERNAL_API_URL: http://internal-api:8001
  EXTERNAL_API_URL: http://external-api:8000
  KAFKA_CONTAINER_NAME: kafka
  EXTERNAL_API_PORT: 8000
  INTERNAL_API_PORT: 8001
  TINYBERT_WORKER_PORT: 8002
  XGBOOST_WORKER_PORT: 8003
  METRICS_SERVICE_PORT: 8004

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: major
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ml-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d major"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Apache Kafka (KRaft Mode)
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092" # Added external port for host-machine testing
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # ADDED: Cluster ID required for KRaft formatting
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      # FIXED: Added EXTERNAL listener and Protocol Map
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/tmp/kraft-combined-logs # ADDED: Volume to prevent data loss on restart
    networks:
      - ml-network
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 40s

  # 2.5 Kafka Init - Creates topics before workers start
  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ml-network
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...'
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic NEW_TASK --bootstrap-server kafka:9092 --partitions 3
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic META_DATA --bootstrap-server kafka:9092 --partitions 3
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic TASK_DATA --bootstrap-server kafka:9092 --partitions 3
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic INFLUENTIAL_TASK --bootstrap-server kafka:9092 --partitions 3
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic BULK_TASK --bootstrap-server kafka:9092 --partitions 3
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic COMPLETED_INFLUENTIAL_TASK --bootstrap-server kafka:9092 --partitions 3
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic COMPLETED_BULK_TASK --bootstrap-server kafka:9092 --partitions 3
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic SAVE_METRICS --bootstrap-server kafka:9092 --partitions 3
        echo 'All Kafka topics created successfully!'
      "

  # 3. External API
  external-api:
    build:
      context: .
      dockerfile: Apis/external/dockerfile
    container_name: external_api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
    networks:
      - ml-network

  # 4. Internal API
  internal-api:
    build:
      context: .
      dockerfile: Apis/internal/dockerfile
    container_name: internal_api
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
    networks:
      - ml-network

  # 5. XGBoost Model Worker
  xgboost:
    build:
      context: .
      dockerfile: Models/XGBoost/dockerfile
    container_name: xgboost-model
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      internal-api:
        condition: service_started
    environment:
      <<: *common-env
    volumes:
      - ./Models/models:/app/Models/models:ro
    networks:
      - ml-network

  # 6. TinyBERT Model Worker
  tinybert:
    build:
      context: .
      dockerfile: Models/TinyBert/dockerfile
    container_name: tinybert-model
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      internal-api:
        condition: service_started
    environment:
      <<: *common-env
    volumes:
      - ./Models/models:/app/Models/models:ro
    networks:
      - ml-network

  # 7. Collector Worker
  collector:
    build:
      context: .
      dockerfile: Workers/Collector/dockerfile
    container_name: collector_worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      internal-api:
        condition: service_started
    environment:
      <<: *common-env
    networks:
      - ml-network

  # 8. Dispatcher Worker
  dispatcher:
    build:
      context: .
      dockerfile: Workers/Dispatcher/dockerfile
    container_name: dispatcher_worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      internal-api:
        condition: service_started
    environment:
      <<: *common-env
    networks:
      - ml-network

  # 9. Processor Worker
  processor:
    build:
      context: .
      dockerfile: Workers/Processor/dockerfile
    container_name: processor_worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      internal-api:
        condition: service_started
    environment:
      <<: *common-env
    networks:
      - ml-network

  # 10. Results Worker
  results:
    build:
      context: .
      dockerfile: Workers/Results/dockerfile
    container_name: results_worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      internal-api:
        condition: service_started
    environment:
      <<: *common-env
    networks:
      - ml-network

  # 11. Metrics Service
  metrics:
    build:
      context: .
      dockerfile: Metrics/dockerfile
    container_name: metrics_service
    ports:
      - "8004:8004"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
    volumes:
      - metrics_data:/app/logs
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  kafka_data: # Added Kafka Volume
    driver: local
  metrics_data: # Persistent CSV storage for metrics
    driver: local